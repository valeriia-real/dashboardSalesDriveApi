<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Dashboard - Salesdrive</title>

    <!-- Flatpickr CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- MonthSelect Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="dark-theme">
    <header class="main-header">
      <div class="header-left">
        <h1 class="header-title">ПРОДАЖІ <span class="header-month">ОСТАННЯ ДОБА</span></h1>
        <p class="header-subtitle">SALESDRIVE <span class="status-badge">0</span> ЗАМОВЛЕНЬ</p>
      </div>

      <div class="header-right">
        <select id="dateRangeSelect">
          <option value="last_day" selected>Остання доба</option>
          <option value="last_week">Попередній тиждень</option>
          <option value="last_7_days">Останні 7 днів</option>
          <option value="last_14_days">Останні 14 днів</option>

          <!-- Місяць і Рік -->
          <option value="month">Місяць</option>
          <option value="year">Рік</option>

          <option value="custom">Вибрати дати...</option>
        </select>

        <!-- Кастомний вибір дат -->
        <div id="customDateRange" style="display: none">
          <input type="text" id="startDate" placeholder="Дата початку" />
          <input type="text" id="endDate" placeholder="Дата кінця" />
        </div>

        <!-- Вибір місяця -->
        <div id="monthPickerContainer" style="display: none">
          <input type="text" id="monthPicker" placeholder="Оберіть місяць" />
        </div>

        <!-- Вибір року -->
        <div id="yearPickerContainer" style="display: none">
          <select id="yearSelect">
            <!-- Опції будуть додані динамічно JS -->
          </select>
        </div>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="metrics-row metrics-group-1">
        <div class="metric-card neon-cyan">
          <p class="metric-label">ОБОРОТ</p>
          <p class="metric-value">0 ₴</p>
        </div>

        <div class="metric-card neon-yellow">
          <p class="metric-label">ПРИБУТОК</p>
          <p class="metric-value">0 ₴</p>
          <p class="metric-subtext">0 замовлень</p>
        </div>

        <div class="metric-card neon-teal">
          <p class="metric-label">СЕРЕДНІЙ ЧЕК</p>
          <p class="metric-value">2000 ₴</p>
          <p class="metric-subtext">по успішних замовленнях</p>
        </div>

        </div> -->
      </section>
